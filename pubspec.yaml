name: khuzdar_marketplace
description: Hyperlocal Service Marketplace for Khuzdar, Balochistan

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.4
  firebase_storage: ^11.6.6
  firebase_messaging: ^14.7.19
  firebase_database: ^10.4.9

  # State management — lightweight
  provider: ^6.1.1

  # Image picking & compression
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # Caching
  cached_network_image: ^3.3.1

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # Routing
  go_router: ^13.0.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

  # Phone number formatting
  libphonenumber_plugin: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
